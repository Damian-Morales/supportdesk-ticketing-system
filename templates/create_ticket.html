{% extends "base.html" %}

{% block title %}Create Ticket - SupportDesk{% endblock %}

{% block content %}
<h1>Create a Support Ticket</h1>
<p>Fill out the form below to submit a new ticket.</p>

<form method="POST">
    <input type="text" name="title" placeholder="Ticket Title" required>

    <input type="text" name="category" placeholder="Category" required>

    <select name="priority" required>
        <option value="">Select Priority</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <select name="status" required>
        <option value="">Select Status</option>
        <option>Open</option>
        <option>In Progress</option>
        <option>Resolved</option>
    </select>

    <textarea name="description" placeholder="Describe your issue" required></textarea>

    <button type="submit" class="btn">Submit Ticket</button>
</form>

<p><a href="/dashboard">Back to Dashboard</a></p>
{% endblock %}
